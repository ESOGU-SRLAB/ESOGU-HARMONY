# ==============================================================================
# WHOLE CELL SIM CONTROLLERS
# ==============================================================================
# Birleşik simülasyon controller yapılandırması.
# Tek bir controller_manager altında tüm sim bileşenlerinin controller'ları:
#   1. UR10e + Lineer Eksen (sim_ur10e_ prefix)
#   2. Kawasaki RS005L kol
#   3. AGV diff drive (ota_base_controller)
#
# Bu dosya whole_cell_sim.urdf.xacro ile birlikte kullanılır.
# gz_ros2_control plugin'i /sim namespace'inde çalışır.
# ==============================================================================

/sim/controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    # === UR10e Sim Controllers ===
    sim_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    sim_io_and_status_controller:
      type: ur_controllers/GPIOController

    sim_speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster

    sim_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    sim_scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    sim_forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    sim_forward_position_controller:
      type: position_controllers/JointGroupPositionController

    sim_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # === Kawasaki RS005L Controllers ===
    kawasaki_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    kawasaki_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # === AGV (OTA) Controllers ===
    ota_base_controller:
      type: diff_drive_controller/DiffDriveController


# ==============================================================================
# UR10e Sim Controller Parametreleri
# ==============================================================================

# Speed Scaling State Broadcaster
/sim/sim_speed_scaling_state_broadcaster:
  ros__parameters:
    state_publish_rate: 100.0

# Joint Trajectory Controller (basit, lineer eksen hariç)
/sim/sim_joint_trajectory_controller:
  ros__parameters:
    joints:
      - sim_ur10e_shoulder_pan_joint
      - sim_ur10e_shoulder_lift_joint
      - sim_ur10e_elbow_joint
      - sim_ur10e_wrist_1_joint
      - sim_ur10e_wrist_2_joint
      - sim_ur10e_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      sim_ur10e_shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_elbow_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_3_joint: { trajectory: 0.2, goal: 0.1 }

# Scaled Joint Trajectory Controller (lineer eksen dahil)
/sim/sim_scaled_joint_trajectory_controller:
  ros__parameters:
    type: ur_controllers/ScaledJointTrajectoryController
    joints:
      - sim_ur10e_base_to_robot_mount
      - sim_ur10e_shoulder_pan_joint
      - sim_ur10e_shoulder_lift_joint
      - sim_ur10e_elbow_joint
      - sim_ur10e_wrist_1_joint
      - sim_ur10e_wrist_2_joint
      - sim_ur10e_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    speed_scaling_interface_name: ""
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      sim_ur10e_base_to_robot_mount: { trajectory: 0.5, goal: 0.3 }
      sim_ur10e_shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_elbow_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_3_joint: { trajectory: 0.2, goal: 0.1 }

# Forward Velocity Controller
/sim/sim_forward_velocity_controller:
  ros__parameters:
    joints:
      - sim_ur10e_shoulder_pan_joint
      - sim_ur10e_shoulder_lift_joint
      - sim_ur10e_elbow_joint
      - sim_ur10e_wrist_1_joint
      - sim_ur10e_wrist_2_joint
      - sim_ur10e_wrist_3_joint
    interface_name: velocity

# Forward Position Controller
/sim/sim_forward_position_controller:
  ros__parameters:
    joints:
      - sim_ur10e_shoulder_pan_joint
      - sim_ur10e_shoulder_lift_joint
      - sim_ur10e_elbow_joint
      - sim_ur10e_wrist_1_joint
      - sim_ur10e_wrist_2_joint
      - sim_ur10e_wrist_3_joint

# Gripper Controller
/sim/sim_gripper_controller:
  ros__parameters:
    joints:
      - sim_ur10e_gripper_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      sim_ur10e_gripper_joint:
        p: 1000.0
        i: 10.0
        d: 50.0

# ==============================================================================
# Kawasaki RS005L Controller Parametreleri
# ==============================================================================

/sim/kawasaki_joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

/sim/kawasaki_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

# ==============================================================================
# AGV (OTA) Diff Drive Controller Parametreleri
# ==============================================================================

/sim/ota_base_controller:
  ros__parameters:
    # Teker joint isimleri (URDF ile birebir aynı olmalı)
    left_wheel_names:
      - wheel_left_base
    right_wheel_names:
      - wheel_right_base

    # Geometri
    wheel_separation: 0.60    # tekerlekler arası mesafe [m]
    wheel_radius: 0.102       # teker yarıçapı [m]

    # Frame isimleri
    base_frame_id: ota_base_link
    odom_frame_id: odom

    # cmd_vel davranışı
    cmd_vel_timeout: 0.25      # [s]
    use_stamped_vel: false

    # Yayın / filtre ayarları
    publish_rate: 50.0
    velocity_rolling_window_size: 10

    # Odom TF yayını
    enable_odom_tf: true

    # Limitler
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0
        has_acceleration_limits: true
        max_acceleration: 1.5

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 2.0
        has_acceleration_limits: true
        max_acceleration: 3.0
