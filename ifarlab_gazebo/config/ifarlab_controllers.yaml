controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    # ==================================
    # Broadcasters
    # ==================================
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    sim_speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster

    sim_io_and_status_controller:
      type: ur_controllers/GPIOController

    # ==================================
    # UR10e + Linear Axis Controllers
    # ==================================
    sim_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    sim_scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    sim_forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    sim_forward_position_controller:
      type: position_controllers/JointGroupPositionController

    sim_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # ==================================
    # Kawasaki Controllers
    # ==================================
    kawasaki_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # ==================================
    # AGV Controller
    # ==================================
    ota_base_controller:
      type: diff_drive_controller/DiffDriveController


# ==========================================
# Parameter configurations for Broadcasters
# ==========================================
sim_speed_scaling_state_broadcaster:
  ros__parameters:
    state_publish_rate: 100.0


# ==========================================
# Parameter configurations for UR10e
# ==========================================
sim_joint_trajectory_controller:
  ros__parameters:
    joints:
      - sim_ur10e_shoulder_pan_joint
      - sim_ur10e_shoulder_lift_joint
      - sim_ur10e_elbow_joint
      - sim_ur10e_wrist_1_joint
      - sim_ur10e_wrist_2_joint
      - sim_ur10e_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      sim_ur10e_shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_elbow_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_3_joint: { trajectory: 0.2, goal: 0.1 }

sim_scaled_joint_trajectory_controller:
  ros__parameters:
    type: ur_controllers/ScaledJointTrajectoryController
    joints:
      - sim_ur10e_base_to_robot_mount
      - sim_ur10e_shoulder_pan_joint
      - sim_ur10e_shoulder_lift_joint
      - sim_ur10e_elbow_joint
      - sim_ur10e_wrist_1_joint
      - sim_ur10e_wrist_2_joint
      - sim_ur10e_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    speed_scaling_interface_name: ""
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      sim_ur10e_base_to_robot_mount: { trajectory: 0.5, goal: 0.3 }
      sim_ur10e_shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_elbow_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      sim_ur10e_wrist_3_joint: { trajectory: 0.2, goal: 0.1 }

sim_forward_velocity_controller:
  ros__parameters:
    joints:
      - sim_ur10e_shoulder_pan_joint
      - sim_ur10e_shoulder_lift_joint
      - sim_ur10e_elbow_joint
      - sim_ur10e_wrist_1_joint
      - sim_ur10e_wrist_2_joint
      - sim_ur10e_wrist_3_joint
    interface_name: velocity

sim_forward_position_controller:
  ros__parameters:
    joints:
      - sim_ur10e_shoulder_pan_joint
      - sim_ur10e_shoulder_lift_joint
      - sim_ur10e_elbow_joint
      - sim_ur10e_wrist_1_joint
      - sim_ur10e_wrist_2_joint
      - sim_ur10e_wrist_3_joint

sim_gripper_controller:
  ros__parameters:
    joints:
      - sim_ur10e_gripper_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      sim_ur10e_gripper_joint:
        p: 1000.0
        i: 10.0
        d: 50.0


# ==========================================
# Parameter configurations for Kawasaki
# ==========================================
kawasaki_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity


# ==========================================
# Parameter configurations for AGV
# ==========================================
ota_base_controller:
  ros__parameters:
    left_wheel_names:
      - wheel_left_base
    right_wheel_names:
      - wheel_right_base

    wheel_separation: 0.60
    wheel_radius: 0.102

    base_frame_id: ota_base_link
    odom_frame_id: odom

    cmd_vel_timeout: 0.25
    use_stamped_vel: false

    publish_rate: 50.0
    velocity_rolling_window_size: 10

    enable_odom_tf: true

    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0
        has_acceleration_limits: true
        max_acceleration: 1.5
    angular:
      z:
        has_velocity_limits: true
        max_velocity: 2.0
        has_acceleration_limits: true
        max_acceleration: 3.0
